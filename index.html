    <script>
        const fileInput = document.getElementById('fileInput');
        const convertBtn = document.getElementById('convertBtn');

        fileInput.addEventListener('change', function() {
            if(this.files[0]) {
                document.getElementById('statusText').innerHTML = `
                    <div class="bg-green-500/10 p-4 rounded-2xl">
                        <p class="text-green-400 font-black text-lg">File Ready</p>
                        <p class="text-slate-400 text-sm mt-1">${this.files[0].name}</p>
                    </div>`;
            }
        });

        convertBtn.addEventListener('click', () => {
            const file = fileInput.files[0];
            if (!file) { alert('Please select a file first!'); return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem('tempFileData', e.target.result);
                localStorage.setItem('targetFormat', document.getElementById('format').value);
                localStorage.setItem('fileName', file.name);
                convertBtn.innerHTML = 'Processing...';
                convertBtn.disabled = true;
                setTimeout(() => { window.location.href = 'download.html'; }, 800);
            };
            reader.readAsDataURL(file);
        });
    </script>
