    <canvas id="canvas" class="hidden"></canvas>

    <script>
        const { jsPDF } = window.jspdf;
        window.onload = function() {
            const dataUrl = localStorage.getItem('tempFileData');
            const targetFormat = localStorage.getItem('targetFormat');
            const fileName = localStorage.getItem('fileName');

            if (!dataUrl) { window.location.href = 'index.html'; return; }

            const img = new Image();
            img.src = dataUrl;
            img.onload = function() {
                const canvas = document.getElementById('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                const downloadBtn = document.getElementById('downloadBtn');
                const baseName = fileName.substring(0, fileName.lastIndexOf('.')) || fileName;

                if (targetFormat === 'application/pdf') {
                    const orientation = img.width > img.height ? 'l' : 'p';
                    const pdf = new jsPDF({
                        orientation: orientation,
                        unit: 'px',
                        format: [img.width, img.height]
                    });
                    pdf.addImage(dataUrl, 'JPEG', 0, 0, img.width, img.height);
                    downloadBtn.onclick = (e) => { e.preventDefault(); pdf.save(`${baseName}.pdf`); };
                } else {
                    const extension = targetFormat.split('/')[1].replace('x-icon', 'ico').replace('jpeg', 'jpg');
                    const convertedUrl = canvas.toDataURL(targetFormat, 1.0);
                    downloadBtn.href = convertedUrl;
                    downloadBtn.download = `${baseName}.${extension}`;
                }

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('readyArea').classList.remove('hidden');
            };
        };
    </script>
